[[manager.prepend_keymap]]
on  = "q"
run = ["plugin --sync autosave", "quit"]
desc = "Save session and quit"

[[manager.prepend_keymap]]
on = "<C-p>"
run = 'shell -- qlmanage -p %s 2>/dev/null'
desc = "Quick Look selected files"

[[manager.prepend_keymap]]
on = "!"
run = 'shell "$SHELL" --block --confirm'
desc = "Open shell here"


[[manager.prepend_keymap]]
on = "p"
run = "plugin --sync smart-paste"
desc = "Paste into the hovered directory or CWD (smart-paste)"


[[manager.prepend_keymap]]
on = "l"
run = "plugin --sync smart-enter"
desc = "Enter the child directory, or open the file (smart-enter)"

[[manager.prepend_keymap]]
on = "<C-d>"
run = "shell 'ripdrag -x \"$@\"' --confirm"
desc = "Drag and drop selected files"

[[manager.prepend_keymap]]
on = "<C-y>"
run = "shell --confirm 'impbcopy \"$0\"'"
desc = "Copy image to clipboard (for pasting into apps)"

[[manager.prepend_keymap]]
on  = ["g", "d"]
run = 'shell -- ya emit cd "$(dirname %h)"'
desc = "Go to directory of hovered file"

[[manager.prepend_keymap]]
on  = "<C-t>"
run = "plugin toggle-pane max-preview"
desc = "Toggle max preview"
